<body style="background-color:black;">
    <style>
        html, body {
            margin: 0;
            height: 100%;
            width: 100%;
            position: fixed;
            overflow: hidden;
            overscroll-behavior: none;
            touch-action: none;
        }
        video {
            left: 50%;
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            height: 100vh;
            width: 100vw;
            object-fit: contain;
            cursor: pointer;
        }
    </style>

    <video id="video-player" muted autoplay playsinline loop>
        <source type="video/mp4">
    </video>

    <script>
        var videoPlayer = document.getElementById("video-player");
        var numVideos = 783;

        var playTimer;

        function play() {
            const randIndex = Math.floor(Math.random() * numVideos) + 1;
            videoPlayer.src = "videos/" + randIndex + ".mp4";
            console.log(videoPlayer.src)
            videoPlayer.load();
            videoPlayer.play();
            clearInterval(playTimer);
            playTimer = setInterval(play, 20000);
        }
        play();

        document.body.addEventListener("click", play);

    </script>
</body>
