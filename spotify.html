<body style="background-color:black;">
    <script type="module" src="spotify.js"></script>

    <img id="album-art">
    <video id="video-player" muted autoplay playsinline loop>
        <source type="video/mp4">
    </video>

    <style>
        img {
            left: 50%;
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        video {
            left: 50%;
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        @media (orientation: landscape) {
            video {
                height: 100vh;
                width: auto;
            }
        }

        @media (orientation: portrait) {
            video {
                width: 100vw;
                height: auto;
            }
        }
    </style>


</body>
